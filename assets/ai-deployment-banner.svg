  <g opacity="0.82">
    <circle cx="1008" cy="104" r="3" fill="#00E5FF">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1060" cy="388" r="4" fill="#8B5CF6">
      <animate attributeName="opacity" values="1;0.25;1" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1460" cy="150" r="4" fill="#00E5FF">
      <animate attributeName="r" values="3;5;3" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="418" r="3" fill="#8B5CF6">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.6s" repeatCount="indefinite"/>
    </circle>
  </g>
